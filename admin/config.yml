backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: 'uk'

collections:
  - name: "content"
    label: "Контент сайту"
    files:
      - name: "funds"
        label: "Благодійні фонди"
        file: "content/funds.json"
        fields:
          - label: "Список фондів"
            name: "funds"
            widget: "list"
            fields:
              - {label: "Назва", name: "name", widget: "string"}
              - {label: "Опис", name: "description", widget: "text"}
              - {label: "Телефон", name: "phone", widget: "string", required: false}
              - {label: "Email", name: "email", widget: "string", required: false}
              - {label: "Веб-сайт", name: "website", widget: "string", required: false}
              - {label: "Категорія", name: "category", widget: "select", options: ["Діти", "Медицина", "Тварини", "Освіта", "Інше"]}

      - name: "settings"
        label: "Налаштування сайту"
        file: "content/settings.json"
        fields:
          - {label: "Заголовок сайту", name: "title", widget: "string"}
          - {label: "Опис", name: "description", widget: "text"}
          - {label: "Контактний email", name: "contact_email", widget: "string"}
          - {label: "Контактний телефон", name: "contact_phone", widget: "string"}
