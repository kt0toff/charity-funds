backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: 'uk'

collections:
  - name: "content"
    label: "Контент сайту"
    files:
      - name: "resources"
        label: "Ресурси"
        file: "content/resources.json"
        fields:
          - label: "Список ресурсів"
            name: "resources"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Назва", name: "name", widget: "string"}
              - {label: "Опис", name: "description", widget: "string"}
              - {label: "Іконка (emoji)", name: "icon", widget: "string", default: "📦"}

      - name: "funds"
        label: "Фонди"
        file: "content/funds.json"
        fields:
          - label: "Список фондів"
            name: "funds"
            widget: "list"
            fields:
              - {label: "ID ресурсу", name: "resource_id", widget: "string"}
              - {label: "Назва фонду", name: "name", widget: "string"}
              - {label: "Контакти", name: "contact", widget: "text"}
              - {label: "Умови надання", name: "conditions", widget: "text"}
