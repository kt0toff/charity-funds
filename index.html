<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Довідник благодійних фондів</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --purple: #667eea;
            --purple2: #764ba2;
            --white: #ffffff;
            --bg: #f5f5f5;
            --border: #e0e0e0;
            --text: #333;
            --text-muted: #666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== TOP NAV ===== */
        .top-nav {
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 50px;
            flex-shrink: 0;
            z-index: 20;
        }

        .nav-left { display: flex; gap: 2px; }

        .nav-tab {
            color: rgba(255,255,255,0.65);
            background: transparent;
            border: none;
            padding: 0 18px;
            height: 50px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }

        .nav-tab:hover { color: white; background: rgba(255,255,255,0.06); }

        .nav-tab.active {
            color: white;
            border-bottom-color: var(--purple);
            background: rgba(102,126,234,0.15);
        }

        .nav-right { display: flex; gap: 8px; }

        .nav-btn {
            background: linear-gradient(135deg, var(--purple), var(--purple2));
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }

        .nav-btn.secondary {
            background: rgba(255,255,255,0.12);
        }

        .nav-btn.secondary:hover { background: rgba(255,255,255,0.2); }

        /* ===== APP BODY ===== */
        .app-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 310px;
            min-width: 220px;
            max-width: 500px;
            background: white;
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            resize: horizontal;
            overflow: auto;
            flex-shrink: 0;
        }

        .sidebar-header {
            background: linear-gradient(135deg, var(--purple) 0%, var(--purple2) 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .sidebar-header h1 { font-size: 1.4em; margin-bottom: 10px; }

        .add-resource-btn {
            background: white;
            color: var(--purple);
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            margin-top: 4px;
            transition: all 0.25s;
        }

        .add-resource-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .filter-section {
            padding: 14px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid var(--border);
        }

        .filter-label { font-size: 0.85em; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }

        .filter-select {
            width: 100%;
            padding: 9px 10px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.92em;
            background: white;
            cursor: pointer;
            transition: border 0.2s;
        }

        .filter-select:focus { outline: none; border-color: var(--purple); }

        .resources-list { flex: 1; overflow-y: auto; padding: 8px; }
        .resources-list::-webkit-scrollbar { width: 4px; }
        .resources-list::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 4px; }

        .resource-item {
            background: #f8f9fa;
            padding: 13px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .resource-item:hover { background: #e9ecef; transform: translateX(4px); }
        .resource-item.active { background: linear-gradient(135deg, var(--purple), var(--purple2)); color: white; }
        .resource-item.active .resource-desc { color: rgba(255,255,255,0.75); }
        .resource-item.dragging { opacity: 0.45; }
        .resource-item.drag-over { border-color: var(--purple); background: #e9ecef; }

        .resource-info { flex: 1; min-width: 0; }
        .resource-name { font-weight: 700; font-size: 1.05em; margin-bottom: 3px; }
        .resource-desc { font-size: 0.82em; color: var(--text-muted); }
        .resource-actions { display: flex; gap: 4px; flex-shrink: 0; }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1em;
            padding: 4px;
            border-radius: 4px;
            transition: transform 0.15s;
        }

        .icon-btn:hover { transform: scale(1.25); }

        /* ===== MAIN CONTENT ===== */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .content-header {
            background: white;
            padding: 18px 22px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .content-title { font-size: 1.9em; color: var(--purple); font-weight: 700; }

        .btn {
            background: linear-gradient(135deg, var(--purple), var(--purple2));
            color: white;
            border: none;
            padding: 11px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.25s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); }

        /* ===== FUNDS GRID ===== */
        .funds-area { flex: 1; overflow-y: auto; padding: 20px; }

        .funds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            align-content: start;
        }

        .fund-card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            transition: all 0.25s;
            border: 2px solid transparent;
        }

        .fund-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.14); border-color: var(--purple); }

        .fund-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .fund-name { font-size: 1.2em; font-weight: 700; color: var(--purple); flex: 1; }
        .fund-actions { display: flex; gap: 4px; }

        .fund-contact {
            color: var(--text-muted);
            font-size: 0.88em;
            margin-bottom: 10px;
            padding: 9px 11px;
            background: #f8f9fa;
            border-radius: 8px;
            white-space: pre-line;
        }

        .fund-conditions { color: var(--text); line-height: 1.55; font-size: 0.93em; }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 70px 20px; color: #aaa; }
        .empty-state-icon { font-size: 4em; margin-bottom: 16px; }
        .empty-state-text { font-size: 1.25em; margin-bottom: 8px; color: #888; }

        /* ===== ORGS TABLE VIEW ===== */
        .orgs-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }

        .orgs-toolbar {
            background: white;
            padding: 14px 22px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .orgs-toolbar-title { font-size: 1.7em; color: var(--purple); font-weight: 700; }

        .orgs-table-wrap { flex: 1; overflow-y: auto; padding: 20px; }

        .orgs-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .orgs-table thead {
            background: linear-gradient(135deg, var(--purple), var(--purple2));
            color: white;
        }

        .orgs-table th {
            padding: 14px 18px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .orgs-table th.col-status { width: 150px; text-align: center; }
        .orgs-table th.col-actions { width: 90px; text-align: center; }

        .orgs-table td {
            padding: 14px 18px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
            font-size: 14px;
        }

        .orgs-table tr:last-child td { border-bottom: none; }
        .orgs-table tr:hover td { background: #fafafa; }

        .org-name-cell { font-weight: 600; color: var(--text); }
        .org-sub { color: var(--text-muted); font-size: 12px; margin-top: 3px; }

        .status-select {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            outline: none;
            transition: all 0.2s;
        }

        .status-active { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .status-inactive { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .status-unknown { background: #e2e3e5; color: #383d41; border-color: #d6d8db; }

        .col-status-td { text-align: center; }
        .col-actions-td { text-align: center; }

        .orgs-empty {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 15px;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.45);
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 18px;
            width: 560px;
            max-width: 94vw;
            max-height: 84vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: slideUp 0.25s;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .modal-header {
            font-size: 1.7em;
            color: var(--purple);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #ede9ff;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: var(--text);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 11px 13px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.2s;
            font-family: inherit;
            background: white;
            color: var(--text);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus { outline: none; border-color: var(--purple); }
        .form-group textarea { min-height: 110px; resize: vertical; }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #6c757d; }

        @media (max-width: 768px) {
            .app-body { flex-direction: column; }
            .sidebar { width: 100%; height: 180px; resize: none; }
            .funds-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- TOP NAV -->
    <div class="top-nav">
        <div class="nav-left">
            <button class="nav-tab active" id="navResources" onclick="showView('resources')">🤝 Ресурси</button>
            <button class="nav-tab" id="navOrgs" onclick="showView('orgs')">🏛️ Благодійні організації</button>
        </div>
        <div class="nav-right">
            <button class="nav-btn secondary" onclick="importData()">📥 Імпорт</button>
            <button class="nav-btn secondary" onclick="exportData()">💾 Експорт</button>
            <button class="nav-btn secondary" onclick="showBackupHistory()">⟳ Бекапи</button>
        </div>
    </div>

    <!-- VIEW: RESOURCES -->
    <div class="app-body" id="viewResources">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🤝 Ресурси</h1>
                <button class="add-resource-btn" onclick="openAddResourceModal()">+ Додати ресурс</button>
            </div>
            <div class="filter-section">
                <div class="filter-label">Сортування:</div>
                <select class="filter-select" id="sortSelect" onchange="applySorting()">
                    <option value="custom">Своє налаштування</option>
                    <option value="az">А → Я</option>
                    <option value="za">Я → А</option>
                </select>
            </div>
            <div class="resources-list" id="resourcesList"></div>
        </div>

        <div class="main-content">
            <div class="content-header">
                <h2 class="content-title" id="contentTitle">Оберіть ресурс</h2>
                <button class="btn btn-success" id="addFundBtn" onclick="openAddFundModal()" style="display:none;">➕ Додати фонд</button>
            </div>
            <div class="funds-area">
                <div class="funds-grid" id="fundsGrid">
                    <div class="empty-state">
                        <div class="empty-state-icon">👈</div>
                        <div class="empty-state-text">Оберіть ресурс зі списку</div>
                        <p>Натисніть на ресурс ліворуч, щоб побачити фонди</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- VIEW: ORGS TABLE -->
    <div class="app-body" id="viewOrgs" style="display:none;">
        <div class="orgs-view">
            <div class="orgs-toolbar">
                <div class="orgs-toolbar-title">🏛️ Благодійні організації</div>
                <button class="btn" onclick="openAddOrgModal()">➕ Додати організацію</button>
            </div>
            <div class="orgs-table-wrap">
                <table class="orgs-table">
                    <thead>
                        <tr>
                            <th>Всі благодійні організації</th>
                            <th class="col-status">Статус</th>
                            <th class="col-actions">Дії</th>
                        </tr>
                    </thead>
                    <tbody id="orgsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL: Resource -->
    <div id="resourceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="resourceModalTitle">Додати ресурс</div>
            <form id="resourceForm">
                <div class="form-group">
                    <label>Назва ресурсу:</label>
                    <input type="text" id="resourceName" required placeholder="Наприклад: Продукти харчування">
                </div>
                <div class="form-group">
                    <label>Опис:</label>
                    <input type="text" id="resourceDescription" required placeholder="Наприклад: Продуктові набори, гарячі обіди">
                </div>
                <div class="form-group">
                    <label>Іконка (emoji):</label>
                    <input type="text" id="resourceIcon" maxlength="2" placeholder="🍲">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">Зберегти</button>
                    <button type="button" class="btn btn-cancel" onclick="closeResourceModal()">Скасувати</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: Fund -->
    <div id="fundModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="fundModalTitle">Додати фонд</div>
            <form id="fundForm">
                <div class="form-group">
                    <label>Назва фонду:</label>
                    <input type="text" id="fundName" required placeholder="Наприклад: Червоний Хрест України">
                </div>
                <div class="form-group">
                    <label>Контакти:</label>
                    <textarea id="fundContact" required placeholder="тел: 0-800-000-000&#10;website.com"></textarea>
                </div>
                <div class="form-group">
                    <label>Умови надання:</label>
                    <textarea id="fundConditions" required placeholder="Опишіть умови отримання допомоги..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">Зберегти</button>
                    <button type="button" class="btn btn-cancel" onclick="closeFundModal()">Скасувати</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: Organization -->
    <div id="orgModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="orgModalTitle">Додати організацію</div>
            <form id="orgForm">
                <div class="form-group">
                    <label>Назва організації:</label>
                    <input type="text" id="orgName" required placeholder="Наприклад: Червоний Хрест України">
                </div>
                <div class="form-group">
                    <label>Опис:</label>
                    <input type="text" id="orgDescription" required placeholder="Міжнародна гуманітарна організація">
                </div>
                <div class="form-group">
                    <label>Контакти:</label>
                    <textarea id="orgContact" required placeholder="тел: 0-800-000-000&#10;website.com"></textarea>
                </div>
                <div class="form-group">
                    <label>Іконка (emoji):</label>
                    <input type="text" id="orgIcon" maxlength="2" placeholder="🏛️">
                </div>
                <div class="form-group">
                    <label>Статус:</label>
                    <select id="orgStatus">
                        <option value="active">✅ Активна</option>
                        <option value="inactive">❌ Неактивна</option>
                        <option value="unknown">❓ Невідомо</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">Зберегти</button>
                    <button type="button" class="btn btn-cancel" onclick="closeOrgModal()">Скасувати</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
