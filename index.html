<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Довідник благодійних фондів</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Ліва панель - список ресурсів */
        .sidebar {
            min-width: 280px;
            max-width: 500px;
            width: auto;
            background: white;
            border-right: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            resize: horizontal;
            overflow: auto;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .sidebar-header h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .add-resource-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .add-resource-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .filter-section {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        .filter-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .filter-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95em;
            background: white;
            cursor: pointer;
            transition: border 0.3s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .resources-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .resource-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: move;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            white-space: normal;
            word-wrap: break-word;
        }

        .resource-item.dragging {
            opacity: 0.5;
        }

        .resource-item.drag-over {
            border-color: #667eea;
            background: #e9ecef;
        }

        .resource-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .resource-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .resource-info {
            flex: 1;
            min-width: 0;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .resource-name {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 5px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .resource-desc {
            font-size: 0.85em;
            opacity: 0.8;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.4;
        }

        .resource-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            padding: 5px;
            transition: transform 0.2s ease;
        }

        .icon-btn:hover {
            transform: scale(1.2);
        }

        /* Права панель - сітка фондів */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            background: white;
            padding: 20px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 2em;
            color: #667eea;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .funds-grid {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            align-content: start;
        }

        .fund-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .fund-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .fund-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .fund-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #667eea;
            flex: 1;
        }

        .fund-actions {
            display: flex;
            gap: 5px;
        }

        .fund-contact {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            white-space: pre-line;
        }

        .fund-conditions {
            color: #333;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        /* Модальні вікна */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel {
            background: #6c757d;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 200px;
            }

            .resources-list {
                display: flex;
                overflow-x: auto;
                overflow-y: hidden;
            }

            .resource-item {
                min-width: 200px;
            }

            .funds-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Ліва панель - список ресурсів -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🤝 Ресурси</h1>
                <button class="add-resource-btn" onclick="openAddResourceModal()">➕ Додати ресурс</button>
            </div>
            <div class="filter-section">
                <div class="filter-label">Сортування:</div>
                <select class="filter-select" id="sortSelect" onchange="applySorting()">
                    <option value="custom">Своє налаштування</option>
                    <option value="az">А → Я</option>
                    <option value="za">Я → А</option>
                </select>
            </div>
            <div class="resources-list" id="resourcesList"></div>
        </div>

        <!-- Права панель - сітка фондів -->
        <div class="main-content">
            <div class="content-header">
                <h2 class="content-title" id="contentTitle">Оберіть ресурс</h2>
                <div class="header-actions">
                    <button class="btn btn-success" id="addFundBtn" onclick="openAddFundModal()" style="display: none;">➕ Додати фонд</button>
                    <button class="btn btn-success" id="addOrgBtn" onclick="openAddOrgModal()" style="display: none;">➕ Додати організацію</button>
                    <button class="btn" onclick="showOrganizations()" title="Переглянути благодійні організації">🏛️ Благодійні організації</button>
                    <button class="btn" onclick="importData()">📥 Імпорт</button>
                    <button class="btn" onclick="exportData()">💾 Експорт</button>
                </div>
            </div>
            <div class="funds-grid" id="fundsGrid">
                <div class="empty-state">
                    <div class="empty-state-icon">👈</div>
                    <div class="empty-state-text">Оберіть ресурс зі списку</div>
                    <p>Натисніть на ресурс ліворуч, щоб побачити фонди</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальне вікно для ресурсу -->
    <div id="resourceModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-header" id="resourceModalTitle">Додати ресурс</h2>
            <form id="resourceForm">
                <div class="form-group">
                    <label>Назва ресурсу:</label>
                    <input type="text" id="resourceName" required placeholder="Наприклад: Продукти харчування">
                </div>
                <div class="form-group">
                    <label>Опис:</label>
                    <input type="text" id="resourceDescription" required placeholder="Наприклад: Продуктові набори, гарячі обіди">
                </div>
                <div class="form-group">
                    <label>Іконка (emoji):</label>
                    <input type="text" id="resourceIcon" maxlength="2" placeholder="🍲">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">Зберегти</button>
                    <button type="button" class="btn btn-cancel" onclick="closeResourceModal()">Скасувати</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальне вікно для фонду -->
    <div id="fundModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-header" id="fundModalTitle">Додати фонд</h2>
            <form id="fundForm">
                <div class="form-group">
                    <label>Назва фонду:</label>
                    <input type="text" id="fundName" required placeholder="Наприклад: Червоний Хрест України">
                </div>
                <div class="form-group">
                    <label>Контакти:</label>
                    <textarea id="fundContact" required placeholder="тел: 0-800-000-000&#10;website.com"></textarea>
                </div>
                <div class="form-group">
                    <label>Умови надання:</label>
                    <textarea id="fundConditions" required placeholder="Опишіть умови отримання допомоги, необхідні документи тощо"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">Зберегти</button>
                    <button type="button" class="btn btn-cancel" onclick="closeFundModal()">Скасувати</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальне вікно для організації -->
    <div id="orgModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-header" id="orgModalTitle">Додати організацію</h2>
            <form id="orgForm">
                <div class="form-group">
                    <label>Назва організації:</label>
                    <input type="text" id="orgName" required placeholder="Наприклад: Червоний Хрест України">
                </div>
                <div class="form-group">
                    <label>Опис:</label>
                    <input type="text" id="orgDescription" required placeholder="Наприклад: Міжнародна гуманітарна організація">
                </div>
                <div class="form-group">
                    <label>Контакти:</label>
                    <textarea id="orgContact" required placeholder="тел: 0-800-000-000&#10;website.com"></textarea>
                </div>
                <div class="form-group">
                    <label>Іконка (emoji):</label>
                    <input type="text" id="orgIcon" maxlength="2" placeholder="🏛️">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">Зберегти</button>
                    <button type="button" class="btn btn-cancel" onclick="closeOrgModal()">Скасувати</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allResources = [];
        let allFunds = [];
        let currentResourceId = null;
        let editingResourceId = null;
        let editingFundId = null;
        let editingOrgId = null;
        let currentSort = 'custom';

        // Дані благодійних організацій
        let organizations = [];

        async function loadData() {
            try {
                // 1. Спочатку спробувати завантажити з localStorage
                const savedResources = localStorage.getItem('charity_resources');
                const savedFunds = localStorage.getItem('charity_funds');

                if (savedResources && savedFunds) {
                    allResources = JSON.parse(savedResources);
                    allFunds = JSON.parse(savedFunds);
                    console.log('✅ Дані завантажено з localStorage');
                } else {
                    // 2. Якщо немає в localStorage, спробувати IndexedDB
                    const backup = await loadBackupFromIndexedDB();

                    if (backup) {
                        allResources = backup.resources;
                        allFunds = backup.funds;
                        if (backup.resourceOrder) {
                            localStorage.setItem('resourceOrder', JSON.stringify(backup.resourceOrder));
                        }
                        // Відновити в localStorage
                        localStorage.setItem('charity_resources', JSON.stringify(allResources));
                        localStorage.setItem('charity_funds', JSON.stringify(allFunds));
                        console.log('✅ Дані відновлено з IndexedDB бекапу');
                    } else {
                        // 3. Якщо немає ніде, завантажити з JSON файлів
                        const [resourcesResponse, fundsResponse] = await Promise.all([
                            fetch('/content/resources.json'),
                            fetch('/content/funds.json')
                        ]);

                        const resourcesData = await resourcesResponse.json();
                        const fundsData = await fundsResponse.json();

                        allResources = resourcesData.resources || [];
                        allFunds = fundsData.funds || [];

                        // Зберегти в localStorage та IndexedDB
                        saveToLocalStorage();
                        console.log('✅ Дані завантажено з JSON файлів');
                    }
                }

                loadCustomOrder();
                renderResources();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('resourcesList').innerHTML = '<p style="text-align: center; padding: 20px; color: red;">Помилка завантаження</p>';
            }
        }

        async function saveToLocalStorage() {
            localStorage.setItem('charity_resources', JSON.stringify(allResources));
            localStorage.setItem('charity_funds', JSON.stringify(allFunds));
            console.log('Дані збережено в localStorage');

            // Також зберегти в IndexedDB для додаткового захисту
            await saveBackupToIndexedDB();
        }

        // ========== IndexedDB Backup System ==========
        const DB_NAME = 'CharityBackupDB';
        const STORE_NAME = 'backups';
        const MAX_BACKUPS = 10; // Зберігати останні 10 бекапів

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);

                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                    }
                };

                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveBackupToIndexedDB() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);

                const backup = {
                    resources: allResources,
                    funds: allFunds,
                    resourceOrder: JSON.parse(localStorage.getItem('resourceOrder') || '{}'),
                    timestamp: new Date().toISOString(),
                    date: new Date().toLocaleString('uk-UA')
                };

                store.add(backup);

                // Видалити старі бекапи, залишити тільки останні MAX_BACKUPS
                const allBackups = await new Promise((resolve) => {
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result);
                });

                if (allBackups.length > MAX_BACKUPS) {
                    const toDelete = allBackups.slice(0, allBackups.length - MAX_BACKUPS);
                    toDelete.forEach(b => store.delete(b.id));
                }

                console.log('✅ Бекап збережено в IndexedDB:', backup.date);
            } catch (error) {
                console.error('❌ Помилка збереження в IndexedDB:', error);
            }
        }

        async function loadBackupFromIndexedDB() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);

                return new Promise((resolve) => {
                    const request = store.getAll();
                    request.onsuccess = () => {
                        const backups = request.result;
                        if (backups.length > 0) {
                            const latest = backups[backups.length - 1];
                            console.log('📦 Знайдено бекап в IndexedDB:', latest.date);
                            resolve(latest);
                        } else {
                            resolve(null);
                        }
                    };
                    request.onerror = () => resolve(null);
                });
            } catch (error) {
                console.error('❌ Помилка завантаження з IndexedDB:', error);
                return null;
            }
        }

        async function getAllBackups() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);

                return new Promise((resolve) => {
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve([]);
                });
            } catch (error) {
                console.error('❌ Помилка отримання бекапів:', error);
                return [];
            }
        }

        async function restoreFromBackup(backupId) {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);

                return new Promise((resolve) => {
                    const request = store.get(backupId);
                    request.onsuccess = () => {
                        const backup = request.result;
                        if (backup) {
                            allResources = backup.resources;
                            allFunds = backup.funds;
                            if (backup.resourceOrder) {
                                localStorage.setItem('resourceOrder', JSON.stringify(backup.resourceOrder));
                            }
                            saveToLocalStorage();
                            loadCustomOrder();
                            renderResources();

                            // Скинути вибраний ресурс
                            currentResourceId = null;
                            document.getElementById('contentTitle').textContent = 'Оберіть ресурс';
                            document.getElementById('addFundBtn').style.display = 'none';
                            document.getElementById('fundsGrid').innerHTML = '';

                            alert('✅ Дані відновлено з бекапу: ' + backup.date);
                            resolve(true);
                        } else {
                            alert('❌ Бекап не знайдено');
                            resolve(false);
                        }
                    };
                    request.onerror = () => {
                        alert('❌ Помилка відновлення бекапу');
                        resolve(false);
                    };
                });
            } catch (error) {
                console.error('❌ Помилка відновлення:', error);
                alert('❌ Помилка відновлення бекапу');
                return false;
            }
        }

        async function showBackupHistory() {
            const backups = await getAllBackups();

            if (backups.length === 0) {
                alert('📋 Немає збережених бекапів');
                return;
            }

            let message = '📋 Історія бекапів:\n\n';
            backups.forEach((b, i) => {
                message += `${i + 1}. ${b.date}\n   Ресурсів: ${b.resources.length}, Фондів: ${b.funds.length}\n\n`;
            });

            const choice = prompt(message + '\nВведіть номер бекапу для відновлення (або 0 для скасування):');

            if (choice && choice !== '0') {
                const index = parseInt(choice) - 1;
                if (index >= 0 && index < backups.length) {
                    if (confirm('Це замінить всі поточні дані. Продовжити?')) {
                        await restoreFromBackup(backups[index].id);
                    }
                } else {
                    alert('❌ Невірний номер бекапу');
                }
            }
        }

        // Автоматичний бекап кожні 30 хвилин
        setInterval(() => {
            saveBackupToIndexedDB();
            console.log('⏰ Автоматичний бекап виконано');
        }, 30 * 60 * 1000);

        // Бекап при закритті сторінки
        window.addEventListener('beforeunload', () => {
            saveBackupToIndexedDB();
        });
        // ========== End IndexedDB Backup System ==========

        function applySorting() {
            currentSort = document.getElementById('sortSelect').value;
            let sortedResources = [...allResources];

            switch(currentSort) {
                case 'az':
                    sortedResources.sort((a, b) => a.name.localeCompare(b.name, 'uk'));
                    break;
                case 'za':
                    sortedResources.sort((a, b) => b.name.localeCompare(a.name, 'uk'));
                    break;
                case 'custom':
                default:
                    sortedResources.sort((a, b) => (a.order || 0) - (b.order || 0));
                    break;
            }

            displayResources(sortedResources);
        }

        function displayResources(resources) {
            const list = document.getElementById('resourcesList');
            list.innerHTML = '';

            resources.forEach((resource, index) => {
                const item = document.createElement('div');
                item.className = 'resource-item';
                item.draggable = currentSort === 'custom';
                item.dataset.resourceId = resource.id;
                item.dataset.index = index;

                if (currentResourceId === resource.id) {
                    item.classList.add('active');
                }

                item.innerHTML = `
                    <div class="resource-info">
                        <div class="resource-name">${resource.icon} ${resource.name}</div>
                        <div class="resource-desc">${resource.description}</div>
                    </div>
                    <div class="resource-actions">
                        <button class="icon-btn" onclick="event.stopPropagation(); openEditResourceModal('${resource.id}')" title="Редагувати">✏️</button>
                        <button class="icon-btn" onclick="event.stopPropagation(); deleteResource('${resource.id}')" title="Видалити">🗑️</button>
                    </div>
                `;

                if (currentSort === 'custom') {
                    item.style.cursor = 'move';
                    item.addEventListener('dragstart', handleDragStart);
                    item.addEventListener('dragover', handleDragOver);
                    item.addEventListener('drop', handleDrop);
                    item.addEventListener('dragend', handleDragEnd);
                } else {
                    item.style.cursor = 'pointer';
                }

                item.onclick = (e) => {
                    if (!e.target.closest('.icon-btn')) {
                        showFunds(resource);
                    }
                };

                list.appendChild(item);
            });
        }

        function renderResources() {
            applySorting();
        }

        let draggedElement = null;

        function handleDragStart(e) {
            draggedElement = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            if (e.preventDefault) {
                e.preventDefault();
            }
            e.dataTransfer.dropEffect = 'move';

            const target = e.target.closest('.resource-item');
            if (target && target !== draggedElement) {
                target.classList.add('drag-over');
            }

            return false;
        }

        function handleDrop(e) {
            if (e.stopPropagation) {
                e.stopPropagation();
            }

            const target = e.target.closest('.resource-item');
            if (draggedElement !== target && target) {
                const draggedIndex = parseInt(draggedElement.dataset.index);
                const targetIndex = parseInt(target.dataset.index);

                const temp = allResources[draggedIndex];
                allResources.splice(draggedIndex, 1);
                allResources.splice(targetIndex, 0, temp);

                allResources.forEach((res, idx) => {
                    res.order = idx;
                });

                saveCustomOrder();
                displayResources(allResources);
            }

            return false;
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.resource-item').forEach(item => {
                item.classList.remove('drag-over');
            });
        }

        function saveCustomOrder() {
            const orderMap = {};
            allResources.forEach((res, idx) => {
                orderMap[res.id] = idx;
            });
            localStorage.setItem('resourceOrder', JSON.stringify(orderMap));
        }

        function loadCustomOrder() {
            const saved = localStorage.getItem('resourceOrder');
            if (saved) {
                try {
                    const orderMap = JSON.parse(saved);
                    allResources.forEach(res => {
                        if (orderMap[res.id] !== undefined) {
                            res.order = orderMap[res.id];
                        }
                    });
                } catch (e) {
                    console.error('Failed to load custom order:', e);
                }
            }
        }

        function showFunds(resource) {
            currentResourceId = resource.id;
            document.getElementById('contentTitle').textContent = `${resource.icon} ${resource.name}`;
            document.getElementById('addFundBtn').style.display = 'block';
            document.getElementById('addOrgBtn').style.display = 'none';

            renderResources();
            renderFunds();
        }

        function renderFunds() {
            const grid = document.getElementById('fundsGrid');
            const funds = allFunds.filter(f => f.resource_id === currentResourceId);

            if (funds.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">Немає фондів</div>
                        <p>Натисніть "➕ Додати фонд", щоб додати перший фонд</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = funds.map((fund, index) => `
                <div class="fund-card">
                    <div class="fund-header">
                        <div class="fund-name">${fund.name}</div>
                        <div class="fund-actions">
                            <button class="icon-btn" onclick="openEditFundModal(${index})" title="Редагувати">✏️</button>
                            <button class="icon-btn" onclick="deleteFund(${index})" title="Видалити">🗑️</button>
                        </div>
                    </div>
                    <div class="fund-contact">📞 ${fund.contact}</div>
                    <div class="fund-conditions">${fund.conditions}</div>
                </div>
            `).join('');
        }

        // Функція для відображення благодійних організацій
        function showOrganizations() {
            // Скинути вибраний ресурс
            currentResourceId = null;
            document.getElementById('contentTitle').textContent = '🏛️ Благодійні організації';
            document.getElementById('addFundBtn').style.display = 'none';
            document.getElementById('addOrgBtn').style.display = 'block';

            // Зняти виділення з ресурсів
            renderResources();

            // Відобразити організації
            const grid = document.getElementById('fundsGrid');

            if (organizations.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏛️</div>
                        <div class="empty-state-text">Немає благодійних організацій</div>
                        <p>Натисніть "➕ Додати організацію", щоб додати першу організацію</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = organizations.map((org, index) => `
                <div class="fund-card">
                    <div class="fund-header">
                        <div class="fund-name">${org.icon} ${org.name}</div>
                        <div class="fund-actions">
                            <button class="icon-btn" onclick="openEditOrgModal(${index})" title="Редагувати">✏️</button>
                            <button class="icon-btn" onclick="deleteOrg(${index})" title="Видалити">🗑️</button>
                        </div>
                    </div>
                    <div class="fund-contact" style="color: #666; margin: 10px 0;">${org.description}</div>
                    <div class="fund-contact">📞 ${org.contact.replace(/\n/g, '<br>')}</div>
                </div>
            `).join('');
        }

        // Модальні вікна для ресурсів
        function openAddResourceModal() {
            editingResourceId = null;
            document.getElementById('resourceModalTitle').textContent = 'Додати ресурс';
            document.getElementById('resourceName').value = '';
            document.getElementById('resourceDescription').value = '';
            document.getElementById('resourceIcon').value = '';
            document.getElementById('resourceModal').classList.add('active');
        }

        function openEditResourceModal(resourceId) {
            editingResourceId = resourceId;
            const resource = allResources.find(r => r.id === resourceId);
            document.getElementById('resourceModalTitle').textContent = 'Редагувати ресурс';
            document.getElementById('resourceName').value = resource.name;
            document.getElementById('resourceDescription').value = resource.description;
            document.getElementById('resourceIcon').value = resource.icon;
            document.getElementById('resourceModal').classList.add('active');
        }

        function closeResourceModal() {
            document.getElementById('resourceModal').classList.remove('active');
        }

        document.getElementById('resourceForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('resourceName').value;
            const description = document.getElementById('resourceDescription').value;
            const icon = document.getElementById('resourceIcon').value || '📦';

            if (editingResourceId) {
                const resource = allResources.find(r => r.id === editingResourceId);
                resource.name = name;
                resource.description = description;
                resource.icon = icon;
            } else {
                const id = name.toLowerCase().replace(/\s+/g, '_').replace(/[^\wа-яА-ЯіІїЇєЄ]/g, '');
                allResources.push({ id, name, description, icon, order: allResources.length });
            }

            saveToLocalStorage();
            renderResources();
            closeResourceModal();
        };

        function deleteResource(resourceId) {
            if (confirm('Ви впевнені, що хочете видалити цей ресурс? Всі фонди цього ресурсу також будуть видалені.')) {
                allResources = allResources.filter(r => r.id !== resourceId);
                allFunds = allFunds.filter(f => f.resource_id !== resourceId);

                if (currentResourceId === resourceId) {
                    currentResourceId = null;
                    document.getElementById('contentTitle').textContent = 'Оберіть ресурс';
                    document.getElementById('addFundBtn').style.display = 'none';
                    document.getElementById('fundsGrid').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">👈</div>
                            <div class="empty-state-text">Оберіть ресурс зі списку</div>
                        </div>
                    `;
                }

                saveToLocalStorage();
                renderResources();
            }
        }

        // Модальні вікна для фондів
        function openAddFundModal() {
            if (!currentResourceId) {
                alert('Спочатку оберіть ресурс');
                return;
            }
            editingFundId = null;
            document.getElementById('fundModalTitle').textContent = 'Додати фонд';
            document.getElementById('fundName').value = '';
            document.getElementById('fundContact').value = '';
            document.getElementById('fundConditions').value = '';
            document.getElementById('fundModal').classList.add('active');
        }

        function openEditFundModal(fundIndex) {
            const funds = allFunds.filter(f => f.resource_id === currentResourceId);
            const fund = funds[fundIndex];
            editingFundId = fundIndex;
            document.getElementById('fundModalTitle').textContent = 'Редагувати фонд';
            document.getElementById('fundName').value = fund.name;
            document.getElementById('fundContact').value = fund.contact;
            document.getElementById('fundConditions').value = fund.conditions;
            document.getElementById('fundModal').classList.add('active');
        }

        function closeFundModal() {
            document.getElementById('fundModal').classList.remove('active');
        }

        document.getElementById('fundForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('fundName').value;
            const contact = document.getElementById('fundContact').value;
            const conditions = document.getElementById('fundConditions').value;

            if (editingFundId !== null) {
                const funds = allFunds.filter(f => f.resource_id === currentResourceId);
                const fund = funds[editingFundId];
                fund.name = name;
                fund.contact = contact;
                fund.conditions = conditions;
            } else {
                allFunds.push({
                    resource_id: currentResourceId,
                    name,
                    contact,
                    conditions
                });
            }

            saveToLocalStorage();
            renderFunds();
            closeFundModal();
        };

        function deleteFund(fundIndex) {
            if (confirm('Ви впевнені, що хочете видалити цей фонд?')) {
                const funds = allFunds.filter(f => f.resource_id === currentResourceId);
                const fund = funds[fundIndex];
                const globalIndex = allFunds.indexOf(fund);
                allFunds.splice(globalIndex, 1);

                saveToLocalStorage();
                renderFunds();
            }
        }

        // Модальні вікна для організацій
        function openAddOrgModal() {
            editingOrgId = null;
            document.getElementById('orgModalTitle').textContent = 'Додати організацію';
            document.getElementById('orgName').value = '';
            document.getElementById('orgDescription').value = '';
            document.getElementById('orgContact').value = '';
            document.getElementById('orgIcon').value = '';
            document.getElementById('orgModal').classList.add('active');
        }

        function openEditOrgModal(orgIndex) {
            const org = organizations[orgIndex];
            editingOrgId = orgIndex;
            document.getElementById('orgModalTitle').textContent = 'Редагувати організацію';
            document.getElementById('orgName').value = org.name;
            document.getElementById('orgDescription').value = org.description;
            document.getElementById('orgContact').value = org.contact;
            document.getElementById('orgIcon').value = org.icon;
            document.getElementById('orgModal').classList.add('active');
        }

        function closeOrgModal() {
            document.getElementById('orgModal').classList.remove('active');
        }

        document.getElementById('orgForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('orgName').value;
            const description = document.getElementById('orgDescription').value;
            const contact = document.getElementById('orgContact').value;
            const icon = document.getElementById('orgIcon').value || '🏛️';

            if (editingOrgId !== null) {
                organizations[editingOrgId] = {
                    id: organizations[editingOrgId].id,
                    name,
                    description,
                    contact,
                    icon
                };
            } else {
                const newId = organizations.length > 0 ? Math.max(...organizations.map(o => o.id)) + 1 : 1;
                organizations.push({
                    id: newId,
                    name,
                    description,
                    contact,
                    icon
                });
            }

            saveOrganizationsToLocalStorage();
            showOrganizations();
            closeOrgModal();
        };

        function deleteOrg(orgIndex) {
            if (confirm('Ви впевнені, що хочете видалити цю організацію?')) {
                organizations.splice(orgIndex, 1);
                saveOrganizationsToLocalStorage();
                showOrganizations();
            }
        }

        function saveOrganizationsToLocalStorage() {
            localStorage.setItem('charity_organizations', JSON.stringify(organizations));
            console.log('✅ Організації збережено в localStorage');
        }

        function loadOrganizationsFromLocalStorage() {
            const saved = localStorage.getItem('charity_organizations');
            if (saved) {
                organizations = JSON.parse(saved);
                console.log('✅ Організації завантажено з localStorage');
            }
        }

        function exportData() {
            const data = {
                resources: allResources,
                funds: allFunds,
                organizations: organizations
            };
            const dataStr = JSON.stringify(data, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `charity_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const data = JSON.parse(event.target.result);

                        if (data.resources && data.funds) {
                            if (confirm('Це замінить всі поточні дані. Продовжити?')) {
                                allResources = data.resources;
                                allFunds = data.funds;
                                if (data.organizations) {
                                    organizations = data.organizations;
                                    saveOrganizationsToLocalStorage();
                                }
                                saveToLocalStorage();
                                renderResources();

                                // Скинути вибраний ресурс
                                currentResourceId = null;
                                document.getElementById('contentTitle').textContent = 'Оберіть ресурс';
                                document.getElementById('addFundBtn').style.display = 'none';
                                document.getElementById('addOrgBtn').style.display = 'none';
                                document.getElementById('fundsGrid').innerHTML = `
                                    <div class="empty-state">
                                        <div class="empty-state-icon">👈</div>
                                        <div class="empty-state-text">Оберіть ресурс зі списку</div>
                                    </div>
                                `;

                                alert('Дані успішно імпортовано!');
                            }
                        } else {
                            alert('Невірний формат файлу. Потрібен JSON з полями resources та funds.');
                        }
                    } catch (error) {
                        alert('Помилка читання файлу: ' + error.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };

        loadData();
        loadOrganizationsFromLocalStorage();
    </script>
</body>
</html>
