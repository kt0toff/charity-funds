<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖥️ Віддалене Керування ПК</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stream-container {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        #screen {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            max-height: 60vh;
            object-fit: contain;
            background: #000;
        }

        .stream-overlay {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-dot.live {
            background: #00ff00;
        }

        .status-dot.offline {
            background: #ff0000;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
        }

        .control-panel h3 {
            margin-bottom: 15px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-full {
            grid-column: 1 / -1;
        }

        .btn-danger {
            background: rgba(255, 59, 48, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 59, 48, 0.5);
        }

        .btn-success {
            background: rgba(52, 199, 89, 0.3);
        }

        .btn-success:hover {
            background: rgba(52, 199, 89, 0.5);
        }

        .touchpad {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            height: 200px;
            margin-bottom: 10px;
            cursor: crosshair;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        .touchpad::before {
            content: '👆 Тачпад';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            font-size: 1.2em;
            pointer-events: none;
        }

        .keyboard-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .keyboard-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .quick-keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .quick-keys .btn {
            padding: 10px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖥️ Віддалене Керування ПК</h1>
            <p>Трансляція екрану та повне керування</p>
        </div>

        <div class="stream-container">
            <div class="stream-overlay">
                <span class="status-dot live" id="statusDot"></span>
                <span id="statusText">🔴 LIVE</span>
            </div>
            <canvas id="screen"></canvas>
        </div>

        <!-- Налаштування трансляції -->
        <div style="text-align: center; margin-bottom: 15px;">
            <button class="btn" onclick="changeRefreshRate(500)" style="margin: 5px;">⚡ 2 FPS</button>
            <button class="btn" onclick="changeRefreshRate(1000)" style="margin: 5px;">✅ 1 FPS</button>
            <button class="btn btn-success" onclick="changeRefreshRate(2000)" style="margin: 5px;">🐌 0.5 FPS (рекомендовано)</button>
            <button class="btn" onclick="testScreenCapture()" style="margin: 5px;">🔍 Тест</button>
            <br>
            <span id="currentFps" style="margin-left: 15px; opacity: 0.7;">Поточна швидкість: 0.5 FPS</span>
            <span id="debugInfo" style="margin-left: 15px; opacity: 0.7; color: #ffcc00;"></span>
        </div>

        <div class="controls">
            <!-- Миша та Тачпад -->
            <div class="control-panel">
                <h3>🖱️ Миша</h3>
                <div class="touchpad" id="touchpad"></div>
                <div class="btn-grid">
                    <button class="btn" onclick="mouseClick(1)">🖱️ Лівий</button>
                    <button class="btn" onclick="mouseClick(3)">🖱️ Правий</button>
                    <button class="btn" onclick="mouseScroll('up')">⬆️ Вгору</button>
                    <button class="btn" onclick="mouseScroll('down')">⬇️ Вниз</button>
                </div>
            </div>

            <!-- Клавіатура -->
            <div class="control-panel">
                <h3>⌨️ Клавіатура</h3>
                <input type="text" class="keyboard-input" id="keyboardInput" placeholder="Введіть текст...">
                <button class="btn btn-full btn-success" onclick="sendText()">📤 Відправити</button>
                <div class="quick-keys">
                    <button class="btn" onclick="sendKey('Return')">↵ Enter</button>
                    <button class="btn" onclick="sendKey('Escape')">⎋ Esc</button>
                    <button class="btn" onclick="sendKey('BackSpace')">⌫ Back</button>
                    <button class="btn" onclick="sendKey('ctrl+c')">📋 Copy</button>
                    <button class="btn" onclick="sendKey('ctrl+v')">📄 Paste</button>
                    <button class="btn" onclick="sendKey('alt+Tab')">🔄 Alt+Tab</button>
                </div>
            </div>

            <!-- Медіа -->
            <div class="control-panel">
                <h3>🎵 Медіа</h3>
                <div class="btn-grid">
                    <button class="btn" onclick="mediaControl('previous')">⏮️ Назад</button>
                    <button class="btn" onclick="mediaControl('play-pause')">⏯️ Play</button>
                    <button class="btn" onclick="mediaControl('next')">⏭️ Вперед</button>
                    <button class="btn" onclick="volumeControl('up')">🔊 +</button>
                    <button class="btn" onclick="volumeControl('down')">🔉 -</button>
                    <button class="btn" onclick="volumeControl('mute')">🔇 Mute</button>
                </div>
            </div>

            <!-- Система -->
            <div class="control-panel">
                <h3>⚙️ Система</h3>
                <div class="btn-grid">
                    <button class="btn btn-success" onclick="scenario('work')">🚀 Робота</button>
                    <button class="btn" onclick="scenario('sleep')">🌙 Сон</button>
                    <button class="btn" onclick="lockPC()">🔒 Блок</button>
                    <button class="btn" onclick="openTerminal()">💻 Термінал</button>
                    <button class="btn btn-danger" onclick="powerAction('shutdown')">🛑 Вимкнути</button>
                    <button class="btn btn-danger" onclick="powerAction('reboot')">🔄 Перезавантажити</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/pc';
        const PC_PASSWORD = '3451'; // Пароль для доступу
        let lastTouch = { x: 0, y: 0 };
        let lastMouseMove = 0;
        const MOUSE_THROTTLE = 50;
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        let streamInterval;

        // Трансляція через Canvas
        function updateScreen() {
            const img = new Image();
            // Видаляємо crossOrigin - він блокує завантаження через ngrok
            // img.crossOrigin = 'anonymous';
            img.onload = function() {
                console.log('✅ Image loaded:', img.width, 'x', img.height);
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                document.getElementById('statusDot').className = 'status-dot live';
                document.getElementById('statusText').textContent = '🔴 LIVE';
            };
            img.onerror = function(e) {
                console.error('❌ Image load error:', e);
                console.error('Image src:', img.src);
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = 'Помилка завантаження';
            };
            const imageUrl = `${API_BASE}/screen_capture?password=${PC_PASSWORD}&t=${Date.now()}`;
            console.log('📸 Loading image:', imageUrl);
            img.src = imageUrl;
        }

        // Запуск трансляції
        let currentRefreshRate = 2000; // За замовчуванням 0.5 FPS для меншого навантаження

        function startStream() {
            updateScreen();
            streamInterval = setInterval(updateScreen, currentRefreshRate);
        }

        // Зміна швидкості оновлення
        function changeRefreshRate(rate) {
            currentRefreshRate = rate;

            // Оновлюємо текст
            const fps = (1000 / rate).toFixed(1);
            document.getElementById('currentFps').textContent = `Поточна швидкість: ${fps} FPS`;

            // Перезапускаємо трансляцію з новою швидкістю
            if (streamInterval) {
                clearInterval(streamInterval);
                streamInterval = setInterval(updateScreen, currentRefreshRate);
            }

            console.log(`Refresh rate changed to ${rate}ms (${fps} FPS)`);
        }

        // Тестування захоплення екрану
        function testScreenCapture() {
            const debugInfo = document.getElementById('debugInfo');
            debugInfo.textContent = '🔄 Тестування...';

            const testUrl = `${API_BASE}/screen_capture?password=${PC_PASSWORD}&t=${Date.now()}`;
            console.log('🧪 Test URL:', testUrl);

            fetch(testUrl)
                .then(response => {
                    console.log('📡 Response status:', response.status);
                    console.log('📡 Response headers:', [...response.headers.entries()]);
                    if (response.ok) {
                        return response.blob();
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                })
                .then(blob => {
                    console.log('✅ Blob received:', blob.size, 'bytes, type:', blob.type);
                    debugInfo.textContent = `✅ OK (${(blob.size/1024).toFixed(0)}KB)`;

                    // Спробуємо відобразити
                    const url = URL.createObjectURL(blob);
                    const img = new Image();
                    img.onload = () => {
                        console.log('✅ Image displayed:', img.width, 'x', img.height);
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        URL.revokeObjectURL(url);
                    };
                    img.onerror = (e) => {
                        console.error('❌ Failed to display image:', e);
                        debugInfo.textContent = '❌ Помилка відображення';
                    };
                    img.src = url;
                })
                .catch(error => {
                    console.error('❌ Test failed:', error);
                    debugInfo.textContent = `❌ ${error.message}`;
                });
        }

        // Тачпад
        const touchpad = document.getElementById('touchpad');
        let isDragging = false;

        touchpad.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastTouch = { x: e.offsetX, y: e.offsetY };
        });

        touchpad.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const now = Date.now();
                if (now - lastMouseMove < MOUSE_THROTTLE) return;
                lastMouseMove = now;

                const dx = (e.offsetX - lastTouch.x) * 2;
                const dy = (e.offsetY - lastTouch.y) * 2;
                lastTouch = { x: e.offsetX, y: e.offsetY };

                fetch(`${API_BASE}/mouse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'move_relative', dx, dy, password: PC_PASSWORD })
                }).catch(err => console.error('Mouse error:', err));
            }
        });

        touchpad.addEventListener('mouseup', () => {
            isDragging = false;
        });

        touchpad.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Touch events
        touchpad.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = touchpad.getBoundingClientRect();
            lastTouch = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        });

        touchpad.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const now = Date.now();
            if (now - lastMouseMove < MOUSE_THROTTLE) return;
            lastMouseMove = now;

            const touch = e.touches[0];
            const rect = touchpad.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            const dx = (x - lastTouch.x) * 2;
            const dy = (y - lastTouch.y) * 2;
            lastTouch = { x, y };

            fetch(`${API_BASE}/mouse`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'move_relative', dx, dy, password: PC_PASSWORD })
            }).catch(err => console.error('Mouse error:', err));
        });

        function mouseClick(button) {
            fetch(`${API_BASE}/mouse`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'click', button, password: PC_PASSWORD })
            }).catch(err => console.error('Click error:', err));
        }

        function mouseScroll(direction) {
            fetch(`${API_BASE}/mouse`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'scroll', direction, amount: 3, password: PC_PASSWORD })
            }).catch(err => console.error('Scroll error:', err));
        }

        function sendText() {
            const input = document.getElementById('keyboardInput');
            const text = input.value;
            if (text) {
                fetch(`${API_BASE}/keyboard`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'type', text, password: PC_PASSWORD })
                }).then(() => {
                    input.value = '';
                }).catch(err => console.error('Type error:', err));
            }
        }

        function sendKey(key) {
            fetch(`${API_BASE}/keyboard`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'key', key, password: PC_PASSWORD })
            }).catch(err => console.error('Key error:', err));
        }

        document.getElementById('keyboardInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendText();
            }
        });

        function mediaControl(action) {
            fetch(`${API_BASE}/media`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, password: PC_PASSWORD })
            }).catch(err => console.error('Media error:', err));
        }

        function volumeControl(action) {
            if (action === 'mute') {
                fetch(`${API_BASE}/mute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PC_PASSWORD })
                }).catch(err => console.error('Mute error:', err));
            } else {
                fetch(`${API_BASE}/volume`, {
                    method: 'GET'
                }).then(r => r.json()).then(data => {
                    const newVol = action === 'up' ?
                        Math.min(100, data.volume + 5) :
                        Math.max(0, data.volume - 5);

                    fetch(`${API_BASE}/volume`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ volume: newVol, password: PC_PASSWORD })
                    }).catch(err => console.error('Volume error:', err));
                }).catch(err => console.error('Volume get error:', err));
            }
        }

        function scenario(mode) {
            fetch(`${API_BASE}/scenario`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode, password: PC_PASSWORD })
            }).catch(err => console.error('Scenario error:', err));
        }

        function lockPC() {
            if (confirm('Заблокувати ПК?')) {
                fetch(`${API_BASE}/lock`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PC_PASSWORD })
                }).catch(err => console.error('Lock error:', err));
            }
        }

        function openTerminal() {
            fetch(`${API_BASE}/linux/terminal`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: PC_PASSWORD })
            }).catch(err => console.error('Terminal error:', err));
        }

        function powerAction(action) {
            const messages = {
                'shutdown': 'Вимкнути ПК?',
                'reboot': 'Перезавантажити ПК?'
            };

            if (confirm(messages[action])) {
                fetch(`${API_BASE}/power`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, password: PC_PASSWORD })
                }).catch(err => console.error('Power error:', err));
            }
        }

        // Запуск
        startStream();
    </script>
</body>
</html>
